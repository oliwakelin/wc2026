# 2026 FIFA World Cup — Match Schedule
# Sources:
#   - Wikipedia: 2026 FIFA World Cup (groups, stadiums)
#   - Sky Sports day-by-day fixtures article (kickoff times in UK/BST, venues by city)
# Notes:
#   - kickoff_uk is in UK time (BST applies in June–July). Times taken verbatim from Sky Sports.
#   - kickoff_local is null because the Sky Sports source listed only UK times.
#   - For knockout matches where teams are not yet determined, placeholders are used.
#   - Stadium names use the FIFA-branded names from the Wikipedia "List of tournament venues" table.

tournament:
  name: 2026 FIFA World Cup
  hosts: [United States, Canada, Mexico]
  start_date: 2026-06-11
  end_date: 2026-07-19
  total_matches: 104
  total_teams: 48

groups:
  A: [Mexico, South Africa, South Korea, Czech Republic]
  B: [Canada, Bosnia and Herzegovina, Qatar, Switzerland]
  C: [Brazil, Morocco, Haiti, Scotland]
  D: [United States, Paraguay, Australia, Turkey]
  E: [Germany, Curacao, Ivory Coast, Ecuador]
  F: [Netherlands, Japan, Sweden, Tunisia]
  G: [Belgium, Egypt, Iran, New Zealand]
  H: [Spain, Cape Verde, Saudi Arabia, Uruguay]
  I: [France, Senegal, Iraq, Norway]
  J: [Argentina, Algeria, Austria, Jordan]
  K: [Portugal, DR Congo, Uzbekistan, Colombia]
  L: [England, Croatia, Ghana, Panama]

